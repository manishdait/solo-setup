grpc:
  startupProbe:
    failureThreshold: 120
    periodSeconds: 2
  livenessProbe:
    initialDelaySeconds: 30
  resources:
    limits:
      memory: 2Gi
    requests:
      cpu: 250m
      memory: 512Mi

